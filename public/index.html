<!DOCTYPE html>
<html>

<head>
	<title>Home</title>
	<meta initial-scale=1.0, width=device-width charset="utf-8">
</head>
<style>
	*{
		margin: 0;
		padding: 0;
		box-sizing: border-box;
		overflow: hidden;
	}

	.root {
		display: grid;
		grid-template-columns: 900px auto;
		width: 100vw;
		height: 100vh;
	}

	canvas{
		border: 1px solid black;
	}

	.display {
		width: 100%;
		height: 100%;
		display: flex;
		align-items: center;
		justify-content: center;
		border-right: 2px solid black;
	}

	.panel {
		display: grid;
		grid-template-columns: 150px auto;
	}

	.controls {
		background-color: #eee;
		padding: 1em;
		overflow-y: scroll;
	}

	.key {
		margin-right: 1em;
		font-family: hermit;
	}

	.panel-header {
  margin-top: 1.5em;
  font-family: hermit;
  font-size: 1.2em;
  border-bottom: 1px solid black;
  margin-bottom: .75em;
}

	input.string, input.number {
		border: none;
		border-bottom: 1px solid black;
		background-color: #fff0;
	}

	iframe {
		all: unset;
	}

	.group {
		padding: 10px;
	}

	.notification {
		z-index: 9819945129;
		width: 25vw;
		max-width: 400px;
		background-color: 'white';
		font-family: 'monospace';
		padding: 1em;
		min-height: 4em;
		border: 1px solid black;
		box-shadow: 6px 6px 0 rgba(0, 0, 0, .13);
		opacity: 1;
		transition: all 2500ms ease;
		pointer-events: none;
	}
</style>

<body>
</body>

<script type="module" src="./script.js"></script>

</html>
